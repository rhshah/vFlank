site_name: vflank
site_description: Variant-aware flanking-sequence extraction and masking for ddPCR assay design
site_url: https://rhshah.github.io/vFlank/
repo_url: https://github.com/rhshah/vFlank
repo_name: rhshah/vFlank
edit_uri: edit/main/docs/
copyright: >
  Copyright &copy; 2026
  <a href="https://github.com/rhshah">Ronak Shah</a> —
  built with <a href="https://squidfunk.github.io/mkdocs-material/">Material for MkDocs</a>

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/dna
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\,(?!\d)|&[lg]t;'
  - section-index
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      zoomable: true
      draggable: true
  - mermaid2
  # Pan/zoom for mermaid diagrams (mermaid renders as inline SVG, which the
  # image lightbox can't grab). Defaults: mermaid true, images false — so this
  # and glightbox don't both target images.
  - panzoom:
      full_screen: true
      always_show_hint: true
      key: "none"
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false
      type: timeago
  - mkdocs-typer2
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            docstring_section_style: table

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets:
      base_path: [".", "docs"]
      auto_append:
        - includes/abbreviations.md
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rhshah/vFlank
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/vflank/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Small Variants: user-guide/small-variants.md
      - Fusions: user-guide/fusions.md
      - SNP Masking: user-guide/masking.md
      - BAM Consensus: user-guide/consensus.md
  - CLI Reference: reference/cli.md
  - How It Works:
      - Architecture: ARCHITECTURE.md
      - Python API: reference/api.md
      - Glossary: reference/glossary.md
      - Research notes:
          - gnomAD API: research/gnomad-api.md
          - SV / VCF input: research/sv-vcf-input.md
          - BAM consensus: research/bam-consensus.md
          - Indel-aware consensus (plan): research/indel-aware-consensus.md
  - Development:
      - Developer Guide: DEVELOPER.md
      - Changelog: changelog.md
