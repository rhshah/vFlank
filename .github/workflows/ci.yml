name: CI

# Runs on the two long-lived branches and on every PR that targets them.
# git-flow feature/release/hotfix branches get CI via their PR, or when
# `git flow ... finish` lands them on develop/main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src/vflank/core src/vflank/io

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest --cov=vflank --cov-report=term-missing

  docs:
    name: Docs build (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # git-revision-date plugin needs history
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[docs]"
      # A plain build fails on config/plugin/dependency errors (exit 1) — the
      # class of breakage that would otherwise only surface at deploy time.
      - name: Build docs
        run: mkdocs build
