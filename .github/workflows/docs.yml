name: Docs

# Versioned docs published with mike (git-flow aligned):
#   push to develop  -> rolling "dev" alias
#   vX.Y.Z tag       -> that version, aliased "latest" and set as default
# PRs do not deploy; CI's "Docs build (no deploy)" job validates them instead.
on:
  push:
    branches: [develop]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Serialise deploys: mike pushes to gh-pages, so concurrent runs would race.
# Queue rather than cancel — never interrupt an in-flight gh-pages push.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # mike needs full history + the gh-pages branch
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[docs]"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      # develop -> the rolling "dev" docs
      - name: Deploy dev docs
        if: github.ref == 'refs/heads/develop'
        run: mike deploy --push --update-aliases dev

      # vX.Y.Z tag -> that version, aliased "latest" and set as default
      - name: Deploy release docs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest
